name: Daily CSS Curation

on:
  schedule:
    # 12:00 AM UTC is 5:00 AM Pakistan Standard Time (PKT)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write # Allows the action to push changes back to the repository

jobs:
  curate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      - name: Run AI Curation Job
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          cd server
          node curateCron.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add server/curatedData.json
          
          # Only commit and push if curatedData.json was modified
          if git diff-index --quiet HEAD server/curatedData.json; then
            echo "No new articles curated today. Skipping commit."
          else
            git commit -m "chore: auto-curate daily CSS articles ($(date -u +'%Y-%m-%d'))"
            git push
          fi
